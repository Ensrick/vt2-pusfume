title = "Pusfume - Custom Career Prototype v0.6.3-dev";
description = "[b]Pusfume - Custom Career Prototype[/b]\n\nFriends-only development build for a new Vermintide 2 career by Ensrick and Janfon.\n\n[b]Current milestone[/b]\n- Adds a full-size clickable Pusfume card above the five-row career grid\n- Integrates Janfon's placeholder as a native third-person skinned unit in local asset builds\n- Uses VT2's normal animated-base and linked-cosmetic architecture\n- Keeps the model-derived selector image as a source-only fallback\n- Registers a dedicated career tint for the in-game player list\n- Resolves Ranger Veteran donor weapons through the stable BackendUtils API\n- Blocks selection safely when melee or ranged weapons are unavailable\n- Adds /pusfume_preflight registration and runtime diagnostics\n- Supports safe Ranger Veteran bot takeover behavior\n- Adds placeholder Great Scheme quests and Pusfume's first three career perks\n- Replaces Ranger Veteran's smoke bomb with a guarded Skaven Ingenuity station scaffold\n- Requires every lobby member to install the same version\n\nAdventure/Keep only. Chaos Wastes, Weaves, Versus, and Official Realm are not supported. Pusfume currently shares Ranger Veteran's loadout and talents.";

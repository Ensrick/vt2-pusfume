title = "Pusfume - Custom Career Prototype v0.6.31-dev";
description = "[b]Pusfume - Custom Career Prototype[/b]\n\nFriends-only development build for a new Vermintide 2 career by Ensrick and Janfon.\n\n[b]Current milestone[/b]\n- Adds a full-size clickable Pusfume card above the five-row career grid\n- Integrates Janfon's native third-person model and portrait\n- Tests native Packmaster first-person arms while Janfon's arms are rebound to the Skaven rig\n- Registers Pusfume-only Packmaster hook and native-action Warpfire Thrower items\n- Adds /pusfume_preflight and /pusfume_gameplay diagnostics\n- Implements the v2 career identity: Aggressive Iteration, Moulder Ingenuity, Hell Pit Native, Scaredy-rat, and Swift Claws\n- Keeps unimplemented attack payloads and consumable transformations explicitly guarded\n- Requires every lobby member to install the same version\n\nAdventure/Keep only. Chaos Wastes, Weaves, Versus, and Official Realm are not supported. Pusfume currently shares Ranger Veteran's talents, while his prototype weapons are custom and fixed for this test.";

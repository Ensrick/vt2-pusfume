title = "Pusfume - Custom Career Prototype v0.6.33-dev";
description = "[b]Pusfume - Custom Career Prototype[/b]\n\nFriends-only development build for a new Vermintide 2 career by Ensrick and Janfon.\n\n[b]Current milestone[/b]\n- Adds a full-size clickable Pusfume card above the five-row career grid\n- Integrates Janfon's native third-person model, first-person hands, and portrait\n- Restricts Pusfume to Packmaster Hook, Warpfire Thrower, Ratling Gun, and Poison Wind Globe prototypes\n- Adds direct Adventure hook damage and guarded native Ratling, Warpfire, and Globadier behavior\n- Routes Pusfume combat dialogue to playable Globadier and adds Warpfire heat HUD data\n- Adds /pusfume_preflight and /pusfume_gameplay diagnostics\n- Implements the v2 career identity: Aggressive Iteration, Moulder Ingenuity, Hell Pit Native, Scaredy-rat, and Swift Claws\n- Keeps full Packmaster dragging and consumable transformations explicitly guarded\n- Requires every lobby member to install the same version\n\nAdventure/Keep only. Chaos Wastes, Weaves, Versus, and Official Realm are not supported. Pusfume currently shares Ranger Veteran's talents; the chest UV/material seam remains a tracked asset issue.";

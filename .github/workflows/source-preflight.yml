name: Source preflight

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  source-preflight:
    runs-on: windows-latest
    timeout-minutes: 10
    steps:
      - name: Check out Pusfume
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Check out VT2 source reference
        uses: actions/checkout@v7
        with:
          repository: Aussiemon/Vermintide-2-Source-Code
          path: Vermintide-2-Source-Code

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Run Python unit tests
        shell: pwsh
        run: python -m unittest discover -s tests -v

      - name: Package Blender extension
        shell: pwsh
        run: python tools/package_blender_addon.py

      - name: Upload Blender extension
        uses: actions/upload-artifact@v7
        with:
          name: vt2-content-tools
          path: .build/dist/vt2_content_tools-*.zip
          if-no-files-found: error

      - name: Run source preflight
        shell: pwsh
        run: ./tools/Test-PusfumeSource.ps1 -SourceRoot ./Vermintide-2-Source-Code

      - name: Check patch hygiene
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "pull_request") {
            git diff --check "${{ github.event.pull_request.base.sha }}" HEAD
          } else {
            git show --check --oneline HEAD
          }
